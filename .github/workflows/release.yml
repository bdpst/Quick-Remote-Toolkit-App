name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore .\QuickRemoteToolkit.App.sln

      - name: Build
        run: dotnet build .\QuickRemoteToolkit.App.sln -c Release --no-restore

      - name: Publish
        run: >
          dotnet publish .\src\QuickRemoteToolkit.App\QuickRemoteToolkit.App.csproj
          -c Release
          -r win-x64
          --self-contained true
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          -o .\publish

      - name: Package
        run: Compress-Archive -Path .\publish\* -DestinationPath .\QuickRemoteToolkit.App-win-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickRemoteToolkit.App-win-x64
          path: .\QuickRemoteToolkit.App-win-x64.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: .\QuickRemoteToolkit.App-win-x64.zip
